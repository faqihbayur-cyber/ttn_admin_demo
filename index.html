<!DOCTYPE html>
<html lang="id">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>TTN Admin Cabang</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="index.css">
  <link rel="stylesheet" href="navbar.css">
  <link rel="stylesheet" href="root.css">

</head>
<body>

  <!-- DASHBOARD -->
  <div class="dashboard" id="dashboard">

    <!-- HEADER -->
    <header class="header">

      <div class="header-user">

        <!-- FOTO / INISIAL -->
        <div class="avatar" id="avatarBox">

          <img id="fotoAdmin" class="avatar-img" style="display:none;">

          <span id="avatarInitial" class="avatar-initial">
            A
          </span>

        </div>

        <!-- INFO -->
        <div class="header-info">

          <div class="admin-name" id="namaAdmin">
            Admin Cabang
          </div>

          <div class="admin-cabang" id="cabangAdmin">
            Cabang -
          </div>

        </div>

      </div>

    </header>

    <!-- CONTENT -->
    <main class="main-content">

      <div class="coming-soon">
        Dashboard Admin Cabang
      </div>

    </main>

  </div>

  <nav></nav>

  <script type="module" src="index.js"></script>
  <script src="navbar.js"></script> 

</body>
</html>
