<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profil — Admin Cabang</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="root.css"/>
  <link rel="stylesheet" href="profil.css"/>
  <link rel="stylesheet" href="navbar.css">
</head>
<body>

<div class="profil-page">

  <!-- SAMPUL -->
  <div class="sampul-wrap" id="sampulWrap">
    <img id="sampulImg" class="sampul-img" alt="Foto Sampul" />
    <div class="sampul-overlay"></div>
    <button class="sampul-back-btn" id="btnBack">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <button class="sampul-edit-btn" id="btnEditSampul">
      <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      Ubah Sampul
    </button>
    <input type="file" id="sampulInput" accept="image/*" style="display:none" />

    <!-- Opsi popup -->
    <div class="sampul-options" id="sampulOptions">
      <button class="sampul-opt-btn" id="btnOptEdit">
        <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        Ganti Foto
      </button>
      <div class="sampul-opt-divider"></div>
      <button class="sampul-opt-btn danger" id="btnOptHapus">
        <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
        Hapus Sampul
      </button>
    </div>
  </div>

  <!-- AVATAR -->
  <div class="avatar-wrap">
    <div class="avatar-ring is-loading" id="avatarRing">
      <img id="avatarImg" alt="" />
      <span id="avatarInitial"></span>
    </div>
  </div>

  <div class="profil-info">
    <div class="profil-nama" id="profilNama"><div class="skeleton-text skeleton-nama"></div></div>
    <div class="profil-role" id="profilRole" style="background:transparent; border:none; padding:0;"><div class="skeleton-text skeleton-role"></div></div>
    <div class="profil-cabang" id="profilCabangParent">
      <div class="skeleton-text skeleton-cabang"></div>
      <span id="profilCabang" style="display:none">—</span>
    </div>
  </div>

  <div class="profil-section">
    <div class="profil-section-title">Informasi Akun</div>
    <div class="profil-row">
      <div class="profil-row-icon">
        <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </div>
      <div class="profil-row-body">
        <div class="profil-row-label">Nama Lengkap</div>
        <div class="profil-row-value" id="rowNama"><div class="skeleton-text width-lg"></div></div>
      </div>
    </div>
    <div class="profil-row">
      <div class="profil-row-icon">
        <svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
      </div>
      <div class="profil-row-body">
        <div class="profil-row-label">Email</div>
        <div class="profil-row-value" id="rowEmail"><div class="skeleton-text width-md"></div></div>
      </div>
    </div>
    <div class="profil-row">
      <div class="profil-row-icon">
        <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      </div>
      <div class="profil-row-body">
        <div class="profil-row-label">Kantor Cabang</div>
        <div class="profil-row-value" id="rowCabang"><div class="skeleton-text width-sm"></div></div>
      </div>
    </div>
    <div class="profil-row">
      <div class="profil-row-icon">
        <svg viewBox="0 0 24 24"><path d="M12 22s-8-4.5-8-11.8A8 8 0 0 1 12 2a8 8 0 0 1 8 8.2c0 7.3-8 11.8-8 11.8z"/><circle cx="12" cy="10" r="3"/></svg>
      </div>
      <div class="profil-row-body">
        <div class="profil-row-label">Role</div>
        <div class="profil-row-value" id="rowRole"><div class="skeleton-text width-sm"></div></div>
      </div>
    </div>
  </div>

  <!-- DATA AKUN -->
  <div class="profil-section">
    <div class="profil-section-title">Pengaturan</div>

    <!-- Row: Peraturan Perusahaan → navigasi -->
    <div class="profil-row profil-row--link" data-href="peraturanperusahaan.html">
      <div class="profil-row-icon">
        <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
      </div>
      <div class="profil-row-body">
        <div class="profil-row-label">Peraturan Perusahaan</div>
        <div class="profil-row-value">Lihat Peraturan</div>
      </div>
      <svg class="profil-row-arrow" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
    </div>

    <!-- Row: Perjanjian Kerja → navigasi -->
    <div class="profil-row profil-row--link" data-href="perjanjiankerja.html">
      <div class="profil-row-icon">
        <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      </div>
      <div class="profil-row-body">
        <div class="profil-row-label">Perjanjian Kerja</div>
        <div class="profil-row-value">Lihat Perjanjian</div>
      </div>
      <svg class="profil-row-arrow" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
    </div>

    <!-- Row: Aksesibilitas → navigasi -->
    <div class="profil-row profil-row--link" data-href="aksesibilitas.html">
      <div class="profil-row-icon">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>
      </div>
      <div class="profil-row-body">
        <div class="profil-row-label">Aksesibilitas</div>
        <div class="profil-row-value">Pengaturan Tampilan</div>
      </div>
      <svg class="profil-row-arrow" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
    </div>

    <!-- Row: Cache → navigasi -->
    <div class="profil-row profil-row--link" data-href="cache.html">
      <div class="profil-row-icon">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>
      </div>
      <div class="profil-row-body">
        <div class="profil-row-label">Cache</div>
        <div class="profil-row-value">Penyimpanan Lokal</div>
      </div>
      <svg class="profil-row-arrow" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
    </div>
  </div>

  <!-- LOGOUT -->
  <button class="btn-logout" id="btnLogout">
    <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
    Keluar
  </button>

</div><!-- /profil-page -->

<!-- CROP MODAL -->
<div class="crop-overlay" id="cropOverlay">
  <div class="crop-modal">
    <div class="crop-modal-header">
      <span class="crop-modal-title">Atur Foto Sampul</span>
      <button class="crop-modal-close" id="btnCropClose">
        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="crop-canvas-wrap" id="cropWrap">
      <canvas id="cropCanvas"></canvas>
      <div class="crop-guide"></div>
    </div>
    <div class="crop-zoom-wrap">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
      <input type="range" id="cropZoom" min="1" max="3" step="0.01" value="1" />
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
    </div>
    <p class="crop-hint">Geser gambar untuk mengatur posisi · Scroll/pinch untuk zoom</p>
    <div class="crop-actions">
      <button class="btn-crop-cancel" id="btnCropCancel">Batal</button>
      <button class="btn-crop-apply" id="btnCropApply">Simpan Sampul</button>
    </div>
  </div>
</div>
<nav></nav>

<script src="navbar.js"></script>
<script type="module" src="profil.js"></script>
<div id="devConsoleMount"></div>
<script src="devconsole.js"></script>
</body>
</html>
