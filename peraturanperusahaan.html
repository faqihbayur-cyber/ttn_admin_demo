<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Peraturan Perusahaan</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #F5F6FA;
      --surface: #FFFFFF;
      --primary: #1C3F7A;
      --primary-light: #2E5FAF;
      --accent: #E8A020;
      --text: #1A1D23;
      --text-muted: #6B7280;
      --border: #E5E7EB;
      --radius: 14px;
      --radius-sm: 8px;
      --shadow: 0 2px 12px rgba(28,63,122,0.09);
      --shadow-lg: 0 8px 32px rgba(28,63,122,0.15);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      color: var(--text);
    }

    /* ── APP SHELL ── */
    .app {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* ── HEADER ── */
    .pp-header {
      position: sticky;
      top: 0;
      z-index: 50;
      background: var(--primary);
      display: flex;
      align-items: center;
      padding: 0 8px;
      height: 56px;
      gap: 4px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.18);
    }
    .pp-back-btn, .pp-search-toggle-btn {
      width: 40px; height: 40px;
      border: none; background: transparent;
      color: #fff; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; cursor: pointer;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    .pp-back-btn:hover, .pp-search-toggle-btn:hover { background: rgba(255,255,255,0.15); }
    .pp-header-title {
      flex: 1;
      color: #fff;
      font-size: 17px;
      font-weight: 600;
      letter-spacing: 0.01em;
      text-align: center;
    }

    /* ── SEARCH BAR ── */
    .pp-search-bar {
      background: var(--primary);
      padding: 0 12px 12px;
      display: none;
    }
    .pp-search-bar.active { display: block; }
    .pp-search-inner {
      position: relative;
      display: flex;
      align-items: center;
    }
    .pp-search-icon {
      position: absolute;
      left: 12px;
      color: var(--text-muted);
      font-size: 14px;
      pointer-events: none;
    }
    .pp-search-input {
      width: 100%;
      border: none;
      border-radius: 24px;
      background: #fff;
      padding: 10px 36px 10px 36px;
      font-size: 14px;
      color: var(--text);
      outline: none;
    }
    .pp-search-clear {
      position: absolute;
      right: 10px;
      border: none;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 14px;
      padding: 4px;
      display: none;
    }
    .pp-search-clear.visible { display: flex; }

    /* ── BODY ── */
    .pp-body {
      flex: 1;
      padding: 16px 14px 100px;
      overflow-y: auto;
    }

    /* ── HERO ── */
    .pp-hero {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
      border-radius: var(--radius);
      padding: 20px 18px 16px;
      color: #fff;
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 20px;
      box-shadow: var(--shadow-lg);
      position: relative;
      overflow: hidden;
    }
    .pp-hero::after {
      content: '';
      position: absolute;
      right: -20px; top: -20px;
      width: 120px; height: 120px;
      border-radius: 50%;
      background: rgba(255,255,255,0.06);
    }
    .pp-hero-icon {
      width: 44px; height: 44px;
      border-radius: 12px;
      background: rgba(255,255,255,0.18);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }
    .pp-hero-title {
      font-size: 19px;
      font-weight: 700;
      letter-spacing: -0.01em;
    }
    .pp-hero-sub {
      font-size: 13px;
      opacity: 0.78;
    }
    .pp-hero-stats {
      display: flex;
      align-items: center;
      gap: 0;
      margin-top: 6px;
      background: rgba(255,255,255,0.12);
      border-radius: 10px;
      padding: 10px 0;
    }
    .pp-hero-stat {
      flex: 1;
      text-align: center;
    }
    .pp-hero-stat-num {
      font-size: 22px;
      font-weight: 800;
      line-height: 1;
    }
    .pp-hero-stat-label {
      font-size: 11px;
      opacity: 0.7;
      margin-top: 3px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .pp-hero-stat-divider {
      width: 1px;
      height: 32px;
      background: rgba(255,255,255,0.25);
    }

    /* ── SECTION LABEL ── */
    .pp-section-label {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 10px;
    }

    /* ── BAB CARD ── */
    .pp-list { display: flex; flex-direction: column; gap: 10px; }

    .pp-bab-card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .pp-bab-header {
      display: flex;
      align-items: center;
      padding: 14px 16px;
      cursor: pointer;
      gap: 12px;
      user-select: none;
      transition: background 0.15s;
    }
    .pp-bab-header:hover { background: #F8F9FF; }
    .pp-bab-num {
      width: 36px; height: 36px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      letter-spacing: 0.02em;
    }
    .pp-bab-info { flex: 1; min-width: 0; }
    .pp-bab-nama {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.3;
    }
    .pp-bab-meta {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }
    .pp-bab-chevron {
      color: var(--text-muted);
      font-size: 13px;
      transition: transform 0.25s;
      flex-shrink: 0;
    }
    .pp-bab-card.open .pp-bab-chevron { transform: rotate(180deg); }

    /* ── PASAL CONTENT ── */
    .pp-bab-content {
      display: none;
      border-top: 1px solid var(--border);
    }
    .pp-bab-card.open .pp-bab-content { display: block; }

    .pp-pasal {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
    }
    .pp-pasal:last-child { border-bottom: none; }

    .pp-pasal-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 8px;
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }
    .pp-pasal-badge {
      background: var(--primary);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 20px;
      white-space: nowrap;
      flex-shrink: 0;
      margin-top: 1px;
    }
    .pp-pasal-ayat {
      font-size: 13px;
      color: var(--text);
      line-height: 1.65;
      padding-left: 4px;
    }
    .pp-ayat-item {
      display: flex;
      gap: 8px;
      margin-bottom: 6px;
    }
    .pp-ayat-item:last-child { margin-bottom: 0; }
    .pp-ayat-num {
      font-size: 12px;
      font-weight: 600;
      color: var(--accent);
      min-width: 20px;
      padding-top: 1px;
      flex-shrink: 0;
    }

    /* ── HIGHLIGHT ── */
    .pp-highlight {
      background: #FFF3B0;
      border-radius: 3px;
      padding: 0 2px;
    }

    /* ── LOADING ── */
    .pp-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
      gap: 12px;
      color: var(--text-muted);
      font-size: 14px;
    }
    .pp-spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── EMPTY STATE ── */
    .pp-empty {
      text-align: center;
      padding: 48px 24px;
      color: var(--text-muted);
      font-size: 14px;
    }
    .pp-empty i { font-size: 36px; margin-bottom: 12px; opacity: 0.35; display: block; }

    /* ── FAB ── */
    .pp-fab {
      position: fixed;
      bottom: 28px;
      right: calc(50% - 240px + 20px);
      width: 52px; height: 52px;
      border-radius: 50%;
      background: var(--primary);
      color: #fff;
      border: none;
      box-shadow: 0 4px 16px rgba(28,63,122,0.35);
      font-size: 18px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      z-index: 40;
      transition: background 0.15s, transform 0.15s;
    }
    .pp-fab:hover { background: var(--primary-light); transform: scale(1.06); }
    @media (max-width: 480px) {
      .pp-fab { right: 20px; }
    }

    /* ── BOTTOM SHEET ── */
    .pp-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.38);
      z-index: 60;
    }
    .pp-overlay.active { display: block; }

    .pp-sheet {
      position: fixed;
      bottom: 0;
      left: 50%; transform: translateX(-50%) translateY(100%);
      width: 100%; max-width: 480px;
      background: var(--surface);
      border-radius: 20px 20px 0 0;
      z-index: 70;
      padding: 12px 16px 32px;
      max-height: 70vh;
      overflow-y: auto;
      transition: transform 0.3s cubic-bezier(.32,1.2,.5,1);
      box-shadow: 0 -4px 32px rgba(0,0,0,0.14);
    }
    .pp-sheet.active { transform: translateX(-50%) translateY(0); }
    .pp-sheet-handle {
      width: 40px; height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 0 auto 14px;
    }
    .pp-sheet-title {
      font-size: 16px; font-weight: 700;
      color: var(--text); margin-bottom: 14px;
      padding-left: 4px;
    }
    .pp-sheet-item {
      display: flex; align-items: center; gap: 12px;
      padding: 11px 8px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: background 0.12s;
    }
    .pp-sheet-item:hover { background: var(--bg); }
    .pp-sheet-item-num {
      width: 28px; height: 28px;
      border-radius: 8px;
      background: var(--bg);
      border: 1px solid var(--border);
      font-size: 11px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      color: var(--primary);
      flex-shrink: 0;
    }
    .pp-sheet-item-label { font-size: 13px; color: var(--text); line-height: 1.35; }
  </style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <div class="pp-header">
    <button class="pp-back-btn" onclick="history.back()" title="Kembali">
      <i class="fa-solid fa-arrow-left"></i>
    </button>
    <div class="pp-header-title">Peraturan Perusahaan</div>
    <button class="pp-search-toggle-btn" onclick="toggleSearch()" title="Cari">
      <i class="fa-solid fa-magnifying-glass"></i>
    </button>
  </div>

  <!-- SEARCH BAR -->
  <div class="pp-search-bar" id="ppSearchBar">
    <div class="pp-search-inner">
      <i class="fa-solid fa-magnifying-glass pp-search-icon"></i>
      <input
        type="text"
        class="pp-search-input"
        id="ppSearchInput"
        placeholder="Cari bab, pasal, atau isi ayat..."
        oninput="filterPeraturan(this.value)"
      />
      <button class="pp-search-clear" id="ppSearchClear" onclick="clearSearch()">
        <i class="fa-solid fa-xmark"></i>
      </button>
    </div>
  </div>

  <!-- BODY -->
  <div class="pp-body">

    <!-- HERO -->
    <div class="pp-hero">
      <div class="pp-hero-icon"><i class="fa-solid fa-scale-balanced"></i></div>
      <div>
        <div class="pp-hero-title">Peraturan Perusahaan</div>
        <div class="pp-hero-sub">Pedoman kerja dan tata tertib perusahaan</div>
      </div>
      <div class="pp-hero-stats">
        <div class="pp-hero-stat">
          <div class="pp-hero-stat-num" id="statBab">—</div>
          <div class="pp-hero-stat-label">Bab</div>
        </div>
        <div class="pp-hero-stat-divider"></div>
        <div class="pp-hero-stat">
          <div class="pp-hero-stat-num" id="statPasal">—</div>
          <div class="pp-hero-stat-label">Pasal</div>
        </div>
        <div class="pp-hero-stat-divider"></div>
        <div class="pp-hero-stat">
          <div class="pp-hero-stat-num" id="statUpdate">—</div>
          <div class="pp-hero-stat-label">Diperbarui</div>
        </div>
      </div>
    </div>

    <!-- LIST BAB -->
    <div class="pp-section-label">Daftar Bab</div>
    <div class="pp-list" id="ppList">
      <div class="pp-loading">
        <div class="pp-spinner"></div>
        <div>Memuat peraturan...</div>
      </div>
    </div>
  </div>

  <!-- FAB -->
  <button class="pp-fab" onclick="openDaftarBab()" title="Daftar Bab">
    <i class="fa-solid fa-list"></i>
  </button>

  <!-- OVERLAY -->
  <div class="pp-overlay" id="ppOverlay" onclick="closeDaftarBab()"></div>

  <!-- BOTTOM SHEET -->
  <div class="pp-sheet" id="ppSheet">
    <div class="pp-sheet-handle"></div>
    <div class="pp-sheet-title">Daftar Bab</div>
    <div id="ppSheetList"></div>
  </div>

</div>

<script>
// ── SAMPLE DATA ─────────────────────────────────────────────────────────────
// Ganti dengan data nyata dari API / JSON file Anda
const PERATURAN_DATA = {
  diperbarui: "2024",
  bab: [
    {
      id: 1,
      nama: "Ketentuan Umum",
      pasal: [
        {
          id: 1, nama: "Pengertian",
          ayat: [
            "Perusahaan adalah PT. Contoh Sejahtera yang berkedudukan di Indonesia.",
            "Karyawan adalah setiap orang yang terikat hubungan kerja dengan perusahaan.",
            "Hari kerja adalah hari-hari yang ditetapkan perusahaan sebagai hari bekerja."
          ]
        },
        {
          id: 2, nama: "Tujuan",
          ayat: [
            "Peraturan ini dibuat untuk menciptakan hubungan industrial yang harmonis.",
            "Memberikan kepastian hak dan kewajiban antara perusahaan dan karyawan.",
            "Mewujudkan lingkungan kerja yang kondusif, produktif, dan berkeadilan."
          ]
        }
      ]
    },
    {
      id: 2,
      nama: "Waktu Kerja",
      pasal: [
        {
          id: 3, nama: "Jam Kerja",
          ayat: [
            "Jam kerja normal adalah 8 jam per hari atau 40 jam per minggu.",
            "Hari kerja ditetapkan 5 (lima) hari dalam seminggu, yaitu Senin hingga Jumat.",
            "Jam kerja dimulai pukul 08.00 dan berakhir pukul 17.00 WIB."
          ]
        },
        {
          id: 4, nama: "Kerja Lembur",
          ayat: [
            "Kerja lembur dilakukan atas dasar perintah tertulis dari atasan langsung.",
            "Kompensasi kerja lembur dihitung sesuai ketentuan perundang-undangan yang berlaku.",
            "Karyawan berhak menolak lembur dengan alasan yang dapat dipertanggungjawabkan."
          ]
        }
      ]
    },
    {
      id: 3,
      nama: "Cuti dan Izin",
      pasal: [
        {
          id: 5, nama: "Cuti Tahunan",
          ayat: [
            "Karyawan yang telah bekerja selama 12 (dua belas) bulan berturut-turut berhak atas cuti tahunan selama 12 (dua belas) hari kerja.",
            "Pengajuan cuti dilakukan minimal 3 (tiga) hari kerja sebelum pelaksanaan.",
            "Cuti yang tidak diambil dalam tahun berjalan dapat dialihkan ke tahun berikutnya maksimal 6 (enam) hari."
          ]
        },
        {
          id: 6, nama: "Cuti Khusus",
          ayat: [
            "Pernikahan karyawan: 3 hari kerja.",
            "Kelahiran anak/istri melahirkan: 2 hari kerja.",
            "Kedukaan keluarga inti: 3 hari kerja.",
            "Ibadah Haji/Umroh: sesuai ketentuan pemerintah."
          ]
        }
      ]
    },
    {
      id: 4,
      nama: "Tata Tertib",
      pasal: [
        {
          id: 7, nama: "Kewajiban Karyawan",
          ayat: [
            "Hadir tepat waktu dan mengisi presensi sesuai ketentuan.",
            "Berpakaian rapi dan sopan sesuai standar perusahaan.",
            "Menjaga kerahasiaan data dan informasi perusahaan.",
            "Menjalankan tugas dengan penuh tanggung jawab dan integritas."
          ]
        },
        {
          id: 8, nama: "Larangan",
          ayat: [
            "Dilarang menggunakan aset perusahaan untuk kepentingan pribadi.",
            "Dilarang melakukan tindakan yang merugikan nama baik perusahaan.",
            "Dilarang membawa, mengonsumsi, atau mengedarkan minuman keras dan narkoba.",
            "Dilarang melakukan pelecehan dalam bentuk apapun kepada sesama karyawan."
          ]
        }
      ]
    },
    {
      id: 5,
      nama: "Sanksi dan Penghargaan",
      pasal: [
        {
          id: 9, nama: "Jenis Sanksi",
          ayat: [
            "Sanksi ringan: teguran lisan atau tertulis.",
            "Sanksi sedang: Surat Peringatan (SP) I dan SP II.",
            "Sanksi berat: SP III, skorsing, hingga Pemutusan Hubungan Kerja (PHK)."
          ]
        },
        {
          id: 10, nama: "Penghargaan",
          ayat: [
            "Karyawan berprestasi berhak mendapatkan penghargaan berupa sertifikat, insentif, atau promosi jabatan.",
            "Penilaian kinerja dilakukan minimal satu kali dalam setahun oleh atasan langsung.",
            "Penghargaan masa kerja diberikan kepada karyawan yang telah mengabdi selama 5, 10, 15, dan 20 tahun."
          ]
        }
      ]
    }
  ]
};

// ── STATE ────────────────────────────────────────────────────────────────────
let allData = null;
let searchActive = false;

// ── INIT ─────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  setTimeout(() => loadData(), 400); // simulate loading
});

function loadData() {
  allData = PERATURAN_DATA;
  renderStats();
  renderList(allData.bab, '');
  renderSheet(allData.bab);
}

// ── STATS ────────────────────────────────────────────────────────────────────
function renderStats() {
  const totalPasal = allData.bab.reduce((s, b) => s + b.pasal.length, 0);
  document.getElementById('statBab').textContent = allData.bab.length;
  document.getElementById('statPasal').textContent = totalPasal;
  document.getElementById('statUpdate').textContent = allData.diperbarui;
}

// ── RENDER LIST ───────────────────────────────────────────────────────────────
function renderList(babs, query) {
  const list = document.getElementById('ppList');
  if (!babs || babs.length === 0) {
    list.innerHTML = `<div class="pp-empty"><i class="fa-solid fa-search-minus"></i>Tidak ditemukan hasil untuk "<strong>${query}</strong>"</div>`;
    return;
  }

  list.innerHTML = babs.map(bab => {
    const pasalHTML = bab.pasal.map(p => {
      const ayatHTML = p.ayat.map((a, i) => `
        <div class="pp-ayat-item">
          <span class="pp-ayat-num">(${i+1})</span>
          <span>${highlight(a, query)}</span>
        </div>
      `).join('');
      return `
        <div class="pp-pasal">
          <div class="pp-pasal-title">
            <span class="pp-pasal-badge">Pasal ${p.id}</span>
            ${highlight(p.nama, query)}
          </div>
          <div class="pp-pasal-ayat">${ayatHTML}</div>
        </div>
      `;
    }).join('');

    const autoOpen = query.trim().length > 0;
    return `
      <div class="pp-bab-card ${autoOpen ? 'open' : ''}" id="bab-${bab.id}">
        <div class="pp-bab-header" onclick="toggleBab(${bab.id})">
          <div class="pp-bab-num">BAB<br>${toRoman(bab.id)}</div>
          <div class="pp-bab-info">
            <div class="pp-bab-nama">${highlight(bab.nama, query)}</div>
            <div class="pp-bab-meta">${bab.pasal.length} pasal</div>
          </div>
          <i class="fa-solid fa-chevron-down pp-bab-chevron"></i>
        </div>
        <div class="pp-bab-content">${pasalHTML}</div>
      </div>
    `;
  }).join('');
}

// ── RENDER SHEET ──────────────────────────────────────────────────────────────
function renderSheet(babs) {
  const sl = document.getElementById('ppSheetList');
  sl.innerHTML = babs.map(b => `
    <div class="pp-sheet-item" onclick="jumpToBab(${b.id})">
      <div class="pp-sheet-item-num">${toRoman(b.id)}</div>
      <div class="pp-sheet-item-label">${b.nama}</div>
    </div>
  `).join('');
}

// ── TOGGLE BAB ────────────────────────────────────────────────────────────────
function toggleBab(id) {
  document.getElementById('bab-' + id).classList.toggle('open');
}

// ── SEARCH ────────────────────────────────────────────────────────────────────
function toggleSearch() {
  searchActive = !searchActive;
  const bar = document.getElementById('ppSearchBar');
  bar.classList.toggle('active', searchActive);
  if (searchActive) {
    setTimeout(() => document.getElementById('ppSearchInput').focus(), 150);
  } else {
    clearSearch();
  }
}

function filterPeraturan(q) {
  const clear = document.getElementById('ppSearchClear');
  clear.classList.toggle('visible', q.length > 0);

  if (!allData) return;
  const term = q.trim().toLowerCase();
  if (!term) { renderList(allData.bab, ''); return; }

  const filtered = allData.bab
    .map(bab => {
      const babMatch = bab.nama.toLowerCase().includes(term);
      const filteredPasal = bab.pasal.filter(p =>
        p.nama.toLowerCase().includes(term) ||
        p.ayat.some(a => a.toLowerCase().includes(term))
      );
      if (babMatch || filteredPasal.length > 0) {
        return { ...bab, pasal: babMatch ? bab.pasal : filteredPasal };
      }
      return null;
    })
    .filter(Boolean);

  renderList(filtered, q);
}

function clearSearch() {
  const input = document.getElementById('ppSearchInput');
  input.value = '';
  document.getElementById('ppSearchClear').classList.remove('visible');
  if (allData) renderList(allData.bab, '');
  input.focus();
}

// ── BOTTOM SHEET ──────────────────────────────────────────────────────────────
function openDaftarBab() {
  document.getElementById('ppOverlay').classList.add('active');
  document.getElementById('ppSheet').classList.add('active');
}

function closeDaftarBab() {
  document.getElementById('ppOverlay').classList.remove('active');
  document.getElementById('ppSheet').classList.remove('active');
}

function jumpToBab(id) {
  closeDaftarBab();
  setTimeout(() => {
    const el = document.getElementById('bab-' + id);
    if (el) {
      el.classList.add('open');
      el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
  }, 320);
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function highlight(text, query) {
  if (!query || !query.trim()) return text;
  const re = new RegExp(`(${escapeRe(query.trim())})`, 'gi');
  return text.replace(re, '<mark class="pp-highlight">$1</mark>');
}

function escapeRe(s) {
  return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

function toRoman(n) {
  const r = ['I','II','III','IV','V','VI','VII','VIII','IX','X'];
  return r[n-1] || n;
}
